name: Daily AGRI Risk Update

on:
  schedule:
    - cron: '0 */2 * * *'  # Runs every 2 hours
  workflow_dispatch:      # Allows manual run button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # IMPORTANT: Fetches all history to prevent sync errors

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nltk requests textblob matplotlib

    - name: Run AGRI Python Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }} # <--- Critical Addition
      run: python agri_engine.py

    - name: Commit and push changes
      run: |
        git config --global user.name "AGRI-Bot"
        git config --global user.email "action@github.com"
        git add -A
        # Stash any local changes if pull fails
        git stash
        git pull --rebase origin main
        # Apply the new data back on top
        git stash pop || echo "No stash to pop"
        git add -A
        git commit -m "Automated AGRI Visual Feed Update" || echo "No changes to commit"
        git push origin main
